data:
  # FeTA 2.4 ships as a BIDS dataset with per-subject subfolders:
  #   feta_2.4/sub-001/anat/sub-001_rec-mial_T2w.nii.gz
  #   feta_2.4/sub-001/anat/sub-001_rec-mial_dseg.nii.gz
  #
  # Flatten all images into one folder and all labels into another, e.g.:
  #   data/feta_2.4/images/sub-001_rec-mial_T2w.nii.gz
  #   data/feta_2.4/labels/sub-001_rec-mial_dseg.nii.gz
  #
  # Quick flatten (bash):
  #   find feta_2.4 -name "*_T2w.nii.gz"   -exec cp {} data/feta_2.4/images/ \;
  #   find feta_2.4 -name "*_dseg.nii.gz"  -exec cp {} data/feta_2.4/labels/ \;
  images_dir: "data/feta_2.4/images"
  labels_dir: "data/feta_2.4/labels"
  num_classes: 8
  val_split: 0.2
  file_extension: ".nii.gz"

preprocessing:
  crop_size: [80,80,80]
  clip_percentile_low: 0.5
  clip_percentile_high: 99.5

model:
  in_channels: 1
  out_channels: 8
  features: [16, 32, 64, 128]
  dropout: 0.1

training:
  batch_size: 1
  num_epochs: 30
  learning_rate: 0.0001
  weight_decay: 1.0e-5
  scheduler: "cosine"       # "cosine" | "step" | "none"
  scheduler_T_max: 100
  dice_weight: 0.5
  ce_weight: 0.5
  save_every: 10            # save checkpoint every N epochs
  early_stopping_patience: 20

evaluation:
  metrics: ["dice"]         # extensible: ["dice", "hd95"]

system:
  num_workers: 4
  device: "cuda"             # "cpu" | "cuda"
  seed: 42
  output_dir: "outputs"
  log_interval: 10          # log every N batches